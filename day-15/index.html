<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeleton Loader Components</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      padding: 72px 24px 100px;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Page header ─── */
    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .page-header h1 {
      font-size: 40px;
      font-weight: 700;
      color: #1d1d1f;
      letter-spacing: -0.025em;
      margin-bottom: 10px;
    }
    .page-header p {
      font-size: 17px;
      color: #6e6e73;
      letter-spacing: -0.01em;
    }

    /* ─── Tab nav ─── */
    .tab-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 56px;
      flex-wrap: wrap;
      row-gap: 8px;
    }
    .tab-sep {
      color: #c7c7cc;
      font-size: 15px;
      padding: 0 14px;
      user-select: none;
    }
    .tab-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      font-weight: 400;
      color: #aeaeb2;
      letter-spacing: -0.01em;
      padding: 4px 0;
      transition: color 0.2s ease;
      -webkit-font-smoothing: antialiased;
    }
    .tab-btn:hover { color: #6e6e73; }
    .tab-btn.active {
      color: #1d1d1f;
      font-weight: 600;
    }

    /* ─── Panels ─── */
    .tab-panel {
      display: none;
      animation: fadeIn 0.25s ease;
    }
    .tab-panel.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Layout ─── */
    .container { max-width: 1080px; margin: 0 auto; }

    .row-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin: 0 auto;
      max-width: 680px;
    }

    /* ─── Shimmer ─── */
    @keyframes shimmer {
      0%   { background-position: -700px 0; }
      100% { background-position: 700px 0; }
    }

    .sk {
      background: linear-gradient(
        90deg,
        #e8e8ed 0px,
        #f2f2f5 180px,
        #e8e8ed 360px
      );
      background-size: 700px 100%;
      animation: shimmer 1.8s ease-in-out infinite;
      border-radius: 8px;
      display: block;
    }

    /* stagger helpers */
    .sk.d1 { animation-delay: 0.08s; }
    .sk.d2 { animation-delay: 0.16s; }
    .sk.d3 { animation-delay: 0.24s; }
    .sk.d4 { animation-delay: 0.32s; }
    .sk.d5 { animation-delay: 0.12s; }
    .sk.d6 { animation-delay: 0.20s; }

    /* ─── Centered single-column panel ─── */
    .panel-single {
      max-width: 480px;
      margin: 0 auto;
    }

    /* ─── Card shell ─── */
    .shell {
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 1px 0 rgba(0,0,0,0.04),
        0 2px 8px rgba(0,0,0,0.06),
        0 8px 24px rgba(0,0,0,0.04);
    }


    /* ════════════════════════════════════════════
       01 — CARD
    ════════════════════════════════════════════ */
    .card-sk .img      { height: 196px; border-radius: 0; }
    .card-sk .body     { padding: 22px 24px 24px; }
    .card-sk .badge    { height: 20px; width: 66px; border-radius: 20px; margin-bottom: 14px; }
    .card-sk .ttl      { height: 18px; width: 84%; margin-bottom: 8px; }
    .card-sk .ttl2     { height: 18px; width: 56%; margin-bottom: 18px; }
    .card-sk .ln       { height: 12px; margin-bottom: 8px; }
    .card-sk .ln2      { height: 12px; width: 70%; }
    .card-sk .divider  { height: 1px; background: #f5f5f7; margin: 18px 0; }
    .card-sk .foot     { display: flex; align-items: center; gap: 10px; }
    .card-sk .av-sm    { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; }
    .card-sk .meta     { flex: 1; }
    .card-sk .m1       { height: 11px; width: 50%; margin-bottom: 5px; }
    .card-sk .m2       { height: 11px; width: 34%; }
    .card-sk .btn      { height: 30px; width: 72px; border-radius: 15px; flex-shrink: 0; }


    /* ════════════════════════════════════════════
       02 — PROFILE
    ════════════════════════════════════════════ */
    .profile-sk-wrap   { position: relative; }
    .profile-sk .cover {
      position: absolute; top: 0; left: 0; right: 0;
      height: 88px; border-radius: 20px 20px 0 0;
    }
    .profile-sk {
      padding: 28px 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .profile-sk .av      { width: 82px; height: 82px; border-radius: 50%; margin-bottom: 14px; border: 3px solid #fff; }
    .profile-sk .name    { height: 18px; width: 126px; margin-bottom: 8px; }
    .profile-sk .handle  { height: 13px; width: 80px; margin-bottom: 22px; }
    .profile-sk .stats   { display: flex; gap: 40px; margin-bottom: 22px; }
    .profile-sk .stat    { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .profile-sk .s-num   { height: 19px; width: 34px; }
    .profile-sk .s-lbl   { height: 11px; width: 40px; }
    .profile-sk .bio-ln  { height: 12px; margin-bottom: 7px; width: 100%; }
    .profile-sk .bio-ln3 { height: 12px; width: 56%; margin-bottom: 20px; }
    .profile-sk .btns    { display: flex; gap: 8px; width: 100%; }
    .profile-sk .b-main  { height: 36px; flex: 1; border-radius: 18px; }
    .profile-sk .b-ico   { height: 36px; width: 36px; border-radius: 18px; flex-shrink: 0; }


    /* ════════════════════════════════════════════
       03 — ARTICLE
    ════════════════════════════════════════════ */
    .article-sk .hero    { height: 264px; border-radius: 0; }
    .article-sk .body    { padding: 28px 32px; }
    .article-sk .tags    { display: flex; gap: 8px; margin-bottom: 18px; }
    .article-sk .tag     { height: 22px; width: 58px; border-radius: 20px; }
    .article-sk .h1      { height: 26px; width: 90%; margin-bottom: 9px; }
    .article-sk .h2      { height: 26px; width: 62%; margin-bottom: 22px; }
    .article-sk .byline  { display: flex; align-items: center; gap: 11px; margin-bottom: 26px; }
    .article-sk .by-av   { width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0; }
    .article-sk .by-name { height: 13px; width: 96px; margin-bottom: 6px; }
    .article-sk .by-date { height: 11px; width: 68px; }
    .article-sk .p       { height: 13px; margin-bottom: 9px; }
    .article-sk .p80     { height: 13px; width: 78%; margin-bottom: 9px; }
    .article-sk .p55     { height: 13px; width: 52%; }
    .article-sk .gap     { height: 1px; background: #f5f5f7; margin: 22px 0; }
    .article-sk .pull    {
      background: #f9f9fb;
      border-left: 3px solid #e8e8ed;
      padding: 14px 16px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 22px;
    }
    .article-sk .pull .p { margin-bottom: 8px; }


    /* ════════════════════════════════════════════
       04 — TABLE
    ════════════════════════════════════════════ */
    .table-sk .t-top {
      padding: 17px 22px;
      border-bottom: 1px solid #f2f2f5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-sk .t-title   { height: 16px; width: 108px; }
    .table-sk .t-actions { display: flex; gap: 8px; }
    .table-sk .t-btn     { height: 30px; width: 76px; border-radius: 15px; }
    .table-sk .t-search  { height: 30px; width: 196px; border-radius: 10px; }

    .table-sk .thead {
      display: grid;
      grid-template-columns: 44px 1.8fr 1.2fr 1fr 108px;
      gap: 12px;
      padding: 12px 22px;
      background: #fafafa;
      border-bottom: 1px solid #f2f2f5;
      align-items: center;
    }
    .table-sk .th    { height: 11px; }

    .table-sk .trow {
      display: grid;
      grid-template-columns: 44px 1.8fr 1.2fr 1fr 108px;
      gap: 12px;
      padding: 15px 22px;
      border-bottom: 1px solid #f9f9fb;
      align-items: center;
    }
    .table-sk .trow:last-child { border-bottom: none; }
    .table-sk .chk    { width: 16px; height: 16px; border-radius: 5px; }
    .table-sk .user-c { display: flex; align-items: center; gap: 10px; }
    .table-sk .u-av   { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; }
    .table-sk .u-info { flex: 1; }
    .table-sk .u-nm   { height: 13px; width: 74%; margin-bottom: 5px; }
    .table-sk .u-em   { height: 11px; width: 54%; }
    .table-sk .td-ln  { height: 13px; }
    .table-sk .badge  { height: 22px; width: 68px; border-radius: 20px; }
    .table-sk .td-sm  { height: 13px; width: 54%; }

    .table-sk .t-foot {
      padding: 14px 22px;
      background: #fafafa;
      border-top: 1px solid #f2f2f5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .table-sk .foot-l { height: 12px; width: 118px; }
    .table-sk .foot-r { display: flex; gap: 6px; }
    .table-sk .pg-btn { height: 28px; width: 28px; border-radius: 7px; }


    /* ════════════════════════════════════════════
       05 — DASHBOARD
    ════════════════════════════════════════════ */
    .dash-sk .d-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .dash-sk .d-left  { display: flex; flex-direction: column; gap: 7px; }
    .dash-sk .d-title { height: 21px; width: 164px; }
    .dash-sk .d-sub   { height: 13px; width: 216px; }
    .dash-sk .d-right { display: flex; gap: 8px; }
    .dash-sk .d-btn   { height: 32px; width: 86px; border-radius: 16px; }
    .dash-sk .d-btn2  { height: 32px; width: 108px; border-radius: 16px; }

    .dash-sk .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 16px;
    }
    .kpi-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.05);
    }
    .kpi-card .k-top  { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .kpi-card .k-lbl  { height: 12px; width: 62%; }
    .kpi-card .k-ico  { width: 28px; height: 28px; border-radius: 8px; }
    .kpi-card .k-val  { height: 28px; width: 52%; margin-bottom: 10px; }
    .kpi-card .k-chg  { height: 12px; width: 72%; }

    .dash-sk .mid-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }
    .chart-card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.05);
    }
    .chart-card .cc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    .chart-card .cc-title  { height: 15px; width: 34%; }
    .chart-card .cc-pills  { display: flex; gap: 6px; }
    .chart-card .cc-pill   { height: 24px; width: 44px; border-radius: 12px; }
    .chart-card .bar-wrap  {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 132px;
    }
    .chart-card .bar       { flex: 1; border-radius: 5px 5px 0 0; }

    .pie-card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.05);
    }
    .pie-card .pc-title    { height: 15px; width: 52%; margin-bottom: 22px; }
    .pie-card .donut-wrap  { display: flex; justify-content: center; margin-bottom: 20px; }
    .pie-card .donut       { width: 96px; height: 96px; border-radius: 50%; }
    .pie-card .legend      { display: flex; flex-direction: column; gap: 10px; }
    .pie-card .leg-row     { display: flex; align-items: center; gap: 8px; }
    .pie-card .leg-dot     { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .pie-card .leg-txt     { height: 12px; flex: 1; }
    .pie-card .leg-val     { height: 12px; width: 28px; }

    .dash-sk .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .list-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.05);
    }
    .list-card .lc-hd {
      padding: 16px 18px;
      border-bottom: 1px solid #f5f5f7;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .list-card .lc-ttl  { height: 14px; width: 96px; }
    .list-card .lc-lnk  { height: 14px; width: 46px; }
    .list-card .lc-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      border-bottom: 1px solid #fafafa;
    }
    .list-card .lc-item:last-child { border-bottom: none; }
    .list-card .lc-ico  { width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0; }
    .list-card .lc-mid  { flex: 1; }
    .list-card .lc-nm   { height: 13px; width: 68%; margin-bottom: 5px; }
    .list-card .lc-sub  { height: 11px; width: 42%; }
    .list-card .lc-val  { height: 14px; width: 44px; }


    /* ════════════════════════════════════════════
       06 — FEED
    ════════════════════════════════════════════ */
    .feed-sk { display: flex; flex-direction: column; }
    .feed-item {
      padding: 20px 22px;
      border-bottom: 1px solid #f5f5f7;
    }
    .feed-item:last-child { border-bottom: none; }

    .feed-item .fi-top  { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
    .feed-item .fi-av   { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; }
    .feed-item .fi-meta { flex: 1; padding-top: 2px; }
    .feed-item .fi-row  { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .feed-item .fi-nm   { height: 14px; width: 110px; }
    .feed-item .fi-badge { height: 14px; width: 42px; border-radius: 4px; }
    .feed-item .fi-hnd  { height: 11px; width: 74px; }
    .feed-item .fi-dot  { width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; }

    .feed-item .fi-text { padding-left: 54px; margin-bottom: 12px; }
    .feed-item .fi-ln   { height: 13px; margin-bottom: 7px; }

    .feed-item .fi-img  {
      margin-left: 54px;
      height: 184px;
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .feed-item .fi-link {
      margin-left: 54px;
      border: 1px solid #f2f2f5;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
      display: flex;
      background: #fafafa;
    }
    .feed-item .fi-link-img  { width: 88px; height: 72px; border-radius: 0; flex-shrink: 0; }
    .feed-item .fi-link-body { padding: 12px; flex: 1; }
    .feed-item .fi-link-ttl  { height: 13px; width: 84%; margin-bottom: 7px; }
    .feed-item .fi-link-sub  { height: 11px; width: 56%; }

    .feed-item .fi-actions {
      padding-left: 54px;
      display: flex;
      gap: 20px;
    }
    .feed-item .fi-act { height: 14px; width: 36px; border-radius: 4px; }

    /* ─── Responsive ─── */
    @media (max-width: 920px) {
      .row-2 { grid-template-columns: 1fr; }
      .dash-sk .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .dash-sk .mid-row { grid-template-columns: 1fr; }
      .dash-sk .bottom-row { grid-template-columns: 1fr; }
      .table-sk .thead,
      .table-sk .trow { grid-template-columns: 44px 1fr 108px; }
      .col-hide { display: none; }
    }
    @media (max-width: 600px) {
      body { padding: 40px 16px 72px; }
      .page-header h1 { font-size: 28px; }
      .dash-sk .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .chart-card .cc-pills { display: none; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Skeleton Loaders</h1>
    <p>Six shimmer-animated loading placeholders</p>
  </div>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="card">card</button>
    <span class="tab-sep">•</span>
    <button class="tab-btn" data-tab="profile">profile</button>
    <span class="tab-sep">•</span>
    <button class="tab-btn" data-tab="article">article</button>
    <span class="tab-sep">•</span>
    <button class="tab-btn" data-tab="table">table</button>
    <span class="tab-sep">•</span>
    <button class="tab-btn" data-tab="dashboard">dashboard</button>
    <span class="tab-sep">•</span>
    <button class="tab-btn" data-tab="feed">feed</button>
  </nav>

  <div class="container">

    <!-- ══ CARD ══ -->
    <div class="tab-panel active" id="panel-card">
      <div class="panel-single">

      <!-- 01 — Card -->
      <div class="section">
        <div class="section-label">Card</div>
        <div class="shell card-sk">
          <div class="sk img"></div>
          <div class="body">
            <div class="sk badge d1"></div>
            <div class="sk ttl d2"></div>
            <div class="sk ttl2 d3"></div>
            <div class="sk ln d2"></div>
            <div class="sk ln2 d3"></div>
            <div class="divider"></div>
            <div class="foot">
              <div class="sk av-sm d1"></div>
              <div class="meta">
                <div class="sk m1 d2"></div>
                <div class="sk m2 d3"></div>
              </div>
              <div class="sk btn d4"></div>
            </div>
          </div>
        </div>
      </div>

      </div>
    </div>

    <!-- ══ PROFILE ══ -->
    <div class="tab-panel" id="panel-profile">
      <div class="panel-single">
        <div class="shell profile-sk-wrap">
          <div class="sk cover" style="height:88px; border-radius:20px 20px 0 0;"></div>
          <div class="profile-sk" style="padding-top:58px;">
            <div class="sk av d1"></div>
            <div class="sk name d2"></div>
            <div class="sk handle d3"></div>
            <div class="stats">
              <div class="stat">
                <div class="sk s-num d1"></div>
                <div class="sk s-lbl d2"></div>
              </div>
              <div class="stat">
                <div class="sk s-num d3"></div>
                <div class="sk s-lbl d4"></div>
              </div>
              <div class="stat">
                <div class="sk s-num d5"></div>
                <div class="sk s-lbl d6"></div>
              </div>
            </div>
            <div style="width:100%">
              <div class="sk bio-ln d2"></div>
              <div class="sk bio-ln d3"></div>
              <div class="sk bio-ln3 d4"></div>
            </div>
            <div class="btns">
              <div class="sk b-main d3"></div>
              <div class="sk b-ico d4"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ ARTICLE ══ -->
    <div class="tab-panel" id="panel-article">
    <div class="shell article-sk">
        <div class="sk hero"></div>
        <div class="body">
          <div class="tags">
            <div class="sk tag d1"></div>
            <div class="sk tag d2" style="width:80px"></div>
          </div>
          <div class="sk h1 d2"></div>
          <div class="sk h2 d3"></div>
          <div class="byline">
            <div class="sk by-av d1"></div>
            <div style="flex:1">
              <div class="sk by-name d2"></div>
              <div class="sk by-date d3" style="margin-top:7px;"></div>
            </div>
          </div>
          <div class="pull">
            <div class="sk p d1"></div>
            <div class="sk p d2"></div>
            <div class="sk p d3" style="width:66%;margin-bottom:0;height:13px;"></div>
          </div>
          <div class="sk p d2"></div>
          <div class="sk p d3"></div>
          <div class="sk p80 d4"></div>
          <div class="gap"></div>
          <div class="sk p d1"></div>
          <div class="sk p d2"></div>
          <div class="sk p55 d3"></div>
        </div>
      </div>
    </div>

    <!-- ══ TABLE ══ -->
    <div class="tab-panel" id="panel-table">
    <div class="shell table-sk">
        <div class="t-top">
          <div class="sk t-title d1"></div>
          <div class="t-actions">
            <div class="sk t-btn d2"></div>
            <div class="sk t-search d3"></div>
          </div>
        </div>
        <div class="thead">
          <div class="sk th chk d1"></div>
          <div class="sk th d2"></div>
          <div class="sk th col-hide d3" style="width:66%"></div>
          <div class="sk th col-hide d4" style="width:50%"></div>
          <div class="sk th d5" style="width:56%"></div>
        </div>
        <div class="trow">
          <div class="sk chk d1"></div>
          <div class="user-c">
            <div class="sk u-av d2"></div>
            <div class="u-info"><div class="sk u-nm d3"></div><div class="sk u-em d4"></div></div>

  <script>
    // ── Web Audio API tab click sound ──
    // No library, no files — synthesized inline.
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTick() {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(1050, audioCtx.currentTime);
      // soft frequency drop for a "thock" feel
      osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.06);

      // quick attack, smooth decay
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);

      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.1);
    }

    // ── Tab switching ──
    const btns   = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;

        // don't replay if already active
        if (btn.classList.contains('active')) return;

        playTick();

        btns.forEach(b => b.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));

        btn.classList.add('active');
        document.getElementById('panel-' + target).classList.add('active');
      });
    });
  </script>
